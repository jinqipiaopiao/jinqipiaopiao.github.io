          <div class="post-content">
            <p>1.先把浏览器网络设置设置成系统代理设置<br>
2.打开BurpSuite，点击Proxy-intercept得intercept is off<br>
3.输入账号密码<br>
4.修改网络设置设置成手动设置127.0.0.1<br>
5.打开BurpSuite，点击Proxy-intercept得intercept is on<br>
6.点击login得到</p>
